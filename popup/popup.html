<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Promptera</title>
  <link rel="stylesheet" href="../fonts/fonts.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="grain"></div>

  <header>
    <img class="logo" src="../icons/Logo.png" alt="Promptera — AI Prompt Optimizer" />
    <span class="build">v0.1.0</span>
  </header>

  <main>
    <div class="field">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIzaSy…" autocomplete="off" spellcheck="false" />
      <p class="hint">
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener"
           style="color: var(--pl-steel); text-decoration: none;">Get a free key at aistudio.google.com/apikey</a>
      </p>
    </div>

    <button id="save-btn">Save Key</button>
    <div id="status-msg"></div>
  </main>

  <footer>
    <a href="https://github.com/" target="_blank" rel="noopener">Docs</a>
    <span id="site-indicator">—</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
